<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartLabsCode</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI;background:#f5f7fa;color:#222}

/* NAVBAR */
.navbar{
position:fixed;top:0;width:100%;height:60px;
display:flex;justify-content:space-between;
align-items:center;padding:0 15px;
background:#fff;border-bottom:1px solid #ddd;
z-index:1000;gap:10px;
}

.search{
padding:8px 12px;border-radius:20px;
border:1px solid #ccc;outline:none;width:200px;
}

/* PROFILE */
.profile-img{
width:34px;height:34px;border-radius:50%;
object-fit:cover;
}

/* SIDEBAR */
.sidebar{
position:fixed;top:60px;left:-260px;
width:240px;height:100%;
background:#fff;padding:15px;
transition:.3s;border-right:1px solid #ddd;
z-index:1001;
}

.sidebar.active{left:0}

.sidebar button{
width:100%;padding:12px;margin:6px 0;
border:none;border-radius:8px;
background:#f3f3f3;cursor:pointer;
display:flex;gap:10px;
}

.sidebar button.active{
background:#4f46e5;color:#fff;
}

/* OVERLAY */
.overlay{
position:fixed;inset:0;
background:rgba(0,0,0,.3);
backdrop-filter:blur(5px);
opacity:0;visibility:hidden;
transition:.3s;z-index:999;
}
.overlay.active{opacity:1;visibility:visible}

/* CONTENT */
.content{margin-top:70px;padding:20px}
.hidden{display:none}

/* CARD */
.card{
background:#fff;padding:15px;
border-radius:10px;margin-bottom:10px;
border:1px solid #ddd;
}

/* INPUT */
.input-box{
display:flex;align-items:center;
border:1px solid #ccc;
border-radius:8px;margin:6px 0;
background:#fff;
gap:8px;
padding:0 10px;
}

.input-box i{color:#555}

.input-box input,.input-box textarea{
flex:1;border:none;outline:none;
padding:10px;
font-family:inherit;
}

/* BUTTON */
button{
padding:10px;border:none;
border-radius:8px;background:#4f46e5;
color:#fff;cursor:pointer;
}

/* HOME FILTER */
.home-filter{
display:flex;gap:10px;margin:10px 0;
}

.home-filter button{
flex:1;background:#e5e7eb;color:#111;
}

.home-filter button.active{
background:#4f46e5;color:#fff;
}

/* BANNER */
.banner-wrap{
display:flex;gap:10px;
overflow-x:auto;margin-bottom:10px;
}

.banner{
min-width:200px;height:120px;
background:#e5e7eb;border-radius:10px;
display:flex;align-items:center;
justify-content:center;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<div>
<i class="fa fa-bars" onclick="toggleSidebar()"></i>
<b><i class="fa fa-code"></i> SmartLabsCode</b>
</div>

<input class="search" id="searchInput" placeholder="Search..." oninput="doSearch()">

<span id="userLabel">Guest</span>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<button onclick="setPage('home',this)" class="active"><i class="fa fa-home"></i>Home</button>
<button onclick="setPage('upload',this)"><i class="fa fa-upload"></i>Upload</button>
<button onclick="setPage('login',this)"><i class="fa fa-right-to-bracket"></i>Login</button>
<button onclick="setPage('profile',this)"><i class="fa fa-user"></i>Edit</button>
</div>

<!-- CONTENT -->
<div class="content">

<!-- HOME -->
<div id="home">
<h2><i class="fa fa-rss"></i> Feed for you</h2>

<!-- BANNER (RESTORED) -->
<div class="banner-wrap">
<div class="banner">Banner 1</div>
<div class="banner">Banner 2</div>
<div class="banner">Banner 3</div>
</div>

<div class="home-filter">
<button class="active" onclick="filterHome('all',this)"><i class="fa fa-border-all"></i> All</button>
<button onclick="filterHome('post',this)"><i class="fa fa-image"></i> Page</button>
<button onclick="filterHome('template',this)"><i class="fa fa-code"></i> Template</button>
<button onclick="filterHome('app',this)"><i class="fa fa-box"></i> App</button>
</div>

<div id="feed"></div>
</div>

<!-- UPLOAD -->
<div id="upload" class="hidden">
<h3><i class="fa fa-cloud-upload"></i> Upload</h3>

<select id="typeSelect">
<option value="post">Post</option>
<option value="template">Template</option>
<option value="app">App</option>
</select>

<div class="input-box"><i class="fa fa-heading"></i><input id="titleInput" placeholder="Title"></div>
<div class="input-box"><i class="fa fa-align-left"></i><input id="descInput" placeholder="Description"></div>
<div class="input-box"><i class="fa fa-file"></i><input type="file" id="fileInput"></div>
<div class="input-box"><i class="fa fa-code"></i><textarea id="codeInput" placeholder="Code"></textarea></div>

<button onclick="uploadPost()"><i class="fa fa-upload"></i> Upload</button>
</div>

<!-- LOGIN -->
<div id="login" class="hidden">
<h3><i class="fa fa-lock"></i> Login</h3>

<div class="input-box"><i class="fa fa-envelope"></i><input id="emailInput"></div>
<div class="input-box"><i class="fa fa-key"></i><input id="passInput" type="password"></div>

<button onclick="loginEmail()"><i class="fa fa-right-to-bracket"></i> Login</button>
<button onclick="register()"><i class="fa fa-user-plus"></i> Register</button>
<button onclick="loginGoogle()"><i class="fa-brands fa-google"></i> Google</button>
<button onclick="loginGithub()"><i class="fa-brands fa-github"></i> GitHub</button>
</div>

<!-- PROFILE -->
<div id="profile" class="hidden">
<h3><i class="fa fa-user-pen"></i> Edit</h3>

<input type="file" id="photoInput">
<div class="input-box"><i class="fa fa-user"></i><input id="usernameInput"></div>
<div class="input-box"><i class="fa fa-calendar"></i><input id="birthInput" type="date"></div>

<button onclick="saveProfile()"><i class="fa fa-floppy-disk"></i> Save</button>
</div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth, signInWithEmailAndPassword,
createUserWithEmailAndPassword,
GoogleAuthProvider, GithubAuthProvider,
signInWithPopup, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore, collection,
addDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getStorage, ref,
uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const app = initializeApp({
apiKey:"AIzaSyC5zC4TCP_Txe21iCbHbVbHxEk4YleDv0Q",
projectId:"smartlabscode",
storageBucket:"smartlabscode.appspot.com"
});

const auth=getAuth();
const db=getFirestore();
const storage=getStorage();

let posts=[];
let currentFilter="all";

/* AUTH */
onAuthStateChanged(auth,u=>{
userLabel.innerText=u?u.email:"Guest";
});

/* LOGIN */
window.loginEmail=()=>signInWithEmailAndPassword(auth,emailInput.value,passInput.value);
window.register=()=>createUserWithEmailAndPassword(auth,emailInput.value,passInput.value);
window.loginGoogle=()=>signInWithPopup(auth,new GoogleAuthProvider());
window.loginGithub=()=>signInWithPopup(auth,new GithubAuthProvider());

/* UPLOAD */
window.uploadPost=async()=>{
let file=fileInput.files[0];
let url="";

if(file){
let r=ref(storage,"files/"+Date.now());
await uploadBytes(r,file);
url=await getDownloadURL(r);
}

await addDoc(collection(db,"posts"),{
title:titleInput.value,
desc:descInput.value,
type:typeSelect.value,
file:url,
code:codeInput.value,
time:Date.now()
});
};

/* LOAD */
onSnapshot(collection(db,"posts"),snap=>{
posts=snap.docs.map(d=>d.data());
render(posts);
});

/* RENDER */
function render(data){
let filtered=currentFilter==="all"?data:data.filter(p=>p.type===currentFilter);
feed.innerHTML="";
filtered.forEach(p=>{
feed.innerHTML+=`
<div class="card">
<h3>${p.title}</h3>
<p>${p.desc}</p>
${p.file?`<img src="${p.file}" style="width:100%">`:``}
${p.code?`<pre>${p.code}</pre>`:``}
</div>`;
});
}

/* FILTER FIX */
window.filterHome=(type,el)=>{
currentFilter=type;

document.querySelectorAll(".home-filter button")
.forEach(b=>b.classList.remove("active"));

el.classList.add("active");

render(posts);
};

/* SEARCH FIX */
window.doSearch=()=>{
let q=searchInput.value.toLowerCase();
render(posts.filter(p=>
(p.title||"").toLowerCase().includes(q)||
(p.desc||"").toLowerCase().includes(q)
));
};

/* PAGE + SIDEBAR FOCUS FIX */
window.setPage=(id,el)=>{
document.querySelectorAll(".content > div").forEach(e=>e.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");

document.querySelectorAll(".sidebar button").forEach(b=>b.classList.remove("active"));
if(el) el.classList.add("active");

closeSidebar();
};

window.toggleSidebar=()=>{
sidebar.classList.add("active");
overlay.classList.add("active");
};

window.closeSidebar=()=>{
sidebar.classList.remove("active");
overlay.classList.remove("active");
};
</script>

</body>
</html>
