<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartLabsCode Hybrid</title>

<!-- FA -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- AOS -->
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>

<style>
body{font-family:sans-serif;background:#f5f5f5;margin:0}
.card{background:#fff;margin:10px;padding:15px;border-radius:10px}
button{padding:8px;border:none;border-radius:6px;background:#4f46e5;color:#fff}
</style>
</head>

<body>

<h2 style="padding:10px">🔥 SmartLabsCode Hybrid</h2>

<div style="padding:10px">
<input id="title" placeholder="Title"><br><br>
<textarea id="desc" placeholder="Description"></textarea><br><br>
<button onclick="uploadPost()">Upload</button>
</div>

<div id="feed"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey:"YOUR_FIREBASE_KEY",
  authDomain:"YOUR_PROJECT.firebaseapp.com"
});

const auth = getAuth();

let currentUser = null;

onAuthStateChanged(auth, (user)=>{
  currentUser = user;
  if(!user){
    signInWithPopup(auth, new GoogleAuthProvider());
  }
});
</script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase = window.supabase.createClient(
  "https://YOUR_PROJECT.supabase.co",
  "YOUR_ANON_KEY"
);

// LOAD POSTS
async function loadPosts(){
  const { data } = await supabase.from("posts").select("*").order("id",{ascending:false});
  const feed = document.getElementById("feed");

  feed.innerHTML = data.map(p=>`
    <div class="card" data-aos="fade-up">
      <h3>${p.title}</h3>
      <p>${p.desc}</p>

      <button onclick="likePost(${p.id})">
        ❤️ <span id="like-${p.id}">0</span>
      </button>

      <div>
        <input id="c-${p.id}" placeholder="Komentar">
        <button onclick="commentPost(${p.id})">Kirim</button>
      </div>

      <div id="comments-${p.id}"></div>
    </div>
  `).join("");

  data.forEach(p=>{
    loadLikes(p.id);
    loadComments(p.id);
  });
}

// UPLOAD
async function uploadPost(){
  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;

  await supabase.from("posts").insert({
    title, desc
  });

  loadPosts();
}

// LIKE
async function likePost(postId){
  await supabase.from("likes").insert({
    post_id: postId,
    user_id: currentUser?.uid || "guest"
  });

  loadLikes(postId);
}

async function loadLikes(postId){
  const { data } = await supabase.from("likes").select("*").eq("post_id",postId);
  document.getElementById(`like-${postId}`).innerText = data.length;
}

// COMMENT
async function commentPost(postId){
  const text = document.getElementById(`c-${postId}`).value;

  await supabase.from("comments").insert({
    post_id: postId,
    user_name: currentUser?.email || "guest",
    text
  });

  loadComments(postId);
}

async function loadComments(postId){
  const { data } = await supabase.from("comments").select("*").eq("post_id",postId);

  document.getElementById(`comments-${postId}`).innerHTML =
    data.map(c=>`<div><b>${c.user_name}</b>: ${c.text}</div>`).join("");
}

// INIT
loadPosts();
</script>

<!-- AOS -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>AOS.init();</script>

</body>
</html>
