<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome To | SmartLabsCode</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI;background:#f5f7fa;color:#222}

/* NAVBAR */
.navbar{
position:fixed;top:0;width:100%;height:60px;
display:flex;justify-content:space-between;
align-items:center;padding:0 15px;
background:#fff;border-bottom:1px solid #ddd;
z-index:1000;gap:10px;
}

.search{
padding:8px 12px;border-radius:20px;
border:1px solid #ccc;outline:none;width:200px;
}

.profile-img-nav{
width:35px;height:35px;border-radius:50%;
object-fit:cover;cursor:pointer;
border:2px solid #4f46e5;
}

/* SIDEBAR */
.sidebar{
position:fixed;top:60px;left:-260px;
width:240px;height:100%;
background:#fff;padding:15px;
transition:.3s;border-right:1px solid #ddd;
z-index:1001;
}

.sidebar.active{left:0}

.sidebar button{
width:100%;padding:12px;margin:6px 0;
border:none;border-radius:8px;
background:#f3f3f3;cursor:pointer;
display:flex;gap:10px;
}

.sidebar button.active{
background:#4f46e5;color:#fff;
}

/* OVERLAY */
.overlay{
position:fixed;inset:0;
background:rgba(0,0,0,.3);
backdrop-filter:blur(5px);
opacity:0;visibility:hidden;
transition:.3s;z-index:999;
}
.overlay.active{opacity:1;visibility:visible}

/* CONTENT */
.content{margin-top:70px;padding:20px}
.hidden{display:none}

/* CARD */
.card{
background:#fff;padding:15px;
border-radius:10px;margin-bottom:10px;
border:1px solid #ddd;
}

/* INPUT */
.input-box{
display:flex;align-items:center;
border:1px solid #ccc;
border-radius:8px;margin:6px 0;
background:#fff;
padding:0 10px;
gap:8px;
}

.input-box input,.input-box textarea{
flex:1;border:none;outline:none;
padding:10px;
}

.password-toggle{
cursor:pointer;color:#666;
}

/* BUTTON */
button{
padding:10px;border:none;
border-radius:8px;background:#4f46e5;
color:#fff;cursor:pointer;
}

/* HOME FILTER */
.home-filter{
display:flex;gap:10px;margin:10px 0;
}

.home-filter button{
flex:1;background:#e5e7eb;color:#111;
}

.home-filter button.active{
background:#4f46e5;color:#fff;
}

/* FULLSCREEN BANNER */
.banner-container{
position:relative;height:200px;margin-bottom:20px;overflow:hidden;
}

.banner-track{
display:flex;height:100%;transition:transform 0.3s ease;
gap:10px;padding-bottom:10px;
}

.banner{
min-width:100%;height:100%;
background:#e5e7eb;border-radius:10px;
display:flex;align-items:center;
justify-content:center;color:#666;
flex-shrink:0;
cursor:pointer;
position:relative;
}

.banner.active{
border:3px solid #4f46e5;
}

/* FILE INPUT CUSTOM */
.file-input-wrapper{
position:relative;display:inline-block;
width:100%;margin:6px 0;
}

.file-input-custom{
display:flex;align-items:center;
gap:10px;padding:12px;
border:2px dashed #ccc;
border-radius:10px;
background:#fafafa;
cursor:pointer;
transition:0.3s;
text-align:center;
}

.file-input-custom:hover{
border-color:#4f46e5;background:#f0f8ff;
}

.file-input-custom i{font-size:24px;color:#4f46e5}
.file-input-hidden{display:none}

/* PROFILE PHOTO */
.profile-photo-input{
width:100px;height:100px;
border-radius:50%;border:3px dashed #ccc;
display:flex;align-items:center;justify-content:center;
cursor:pointer;font-size:40px;color:#ccc;
margin:10px auto;
transition:0.3s;
}

.profile-photo-input:hover{
border-color:#4f46e5;color:#4f46e5;
}

.profile-photo-preview{
width:100px;height:100px;
border-radius:50%;object-fit:cover;
border:3px solid #4f46e5;
margin:10px auto;
display:block;
}

/* CODE EDITOR */
.code-editor{
width:100%;min-height:200px;
border:1px solid #ccc;border-radius:8px;
padding:15px;font-family:monospace;
background:#1e1e1e;color:#fff;
resize:vertical;
}

/* TYPE ICONS */
.type-icon{
font-size:20px;margin-right:5px;
}
.page-icon{color:#ef4444}
.template-icon{color:#10b981}
.app-icon{color:#3b82f6}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<div>
<i class="fa fa-bars" onclick="toggleSidebar()"></i>
<b><i class="fa fa-code"></i> SmartLabsCode</b>
</div>

<input class="search" id="searchInput" placeholder="Search..." oninput="doSearch()">

<div style="display:flex;align-items:center;gap:10px">
<img id="profileImgNav" src="https://via.placeholder.com/35?text=👤" class="profile-img-nav" onclick="setPage('profile',null)">
<span id="userLabel">Guest</span>
</div>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<button onclick="setPage('home',this)" class="active"><i class="fa fa-home"></i>Home</button>
<button onclick="setPage('upload',this)"><i class="fa fa-upload"></i>Upload</button>
<button onclick="setPage('login',this)"><i class="fa fa-right-to-bracket"></i>Login</button>
<button onclick="setPage('profile',this)"><i class="fa fa-user"></i>Edit</button>
</div>

<div class="content">

<!-- HOME -->
<div id="home">
<h2><i class="fa fa-rss"></i> Feed</h2>

<div class="banner-container" id="bannerContainer">
<div class="banner-track" id="bannerTrack"></div>
</div>

<div class="home-filter">
<button class="active" onclick="filterHome('all',this)"><i class="fa fa-th"></i>All</button>
<button onclick="filterHome('page',this)"><i class="fa fa-image"></i>Page</button>
<button onclick="filterHome('template',this)"><i class="fa fa-file-code"></i>Template</button>
<button onclick="filterHome('app',this)"><i class="fa fa-mobile-alt"></i>App</button>
</div>

<div id="feed"></div>
</div>

<!-- UPLOAD -->
<div id="upload" class="hidden">
<h3><i class="fa fa-upload"></i> Upload</h3>

<div class="input-box">
<select id="typeSelect" onchange="toggleUploadFields()">
<option value="page">📱 Page</option>
<option value="template">💻 Template</option>
<option value="app">📲 App</option>
</select>
</div>

<div class="input-box"><input id="titleInput" placeholder="Title"></div>
<div class="input-box"><textarea id="descInput" placeholder="Description" rows="3"></textarea></div>

<!-- PAGE FIELDS -->
<div id="pageFields">
<div class="file-input-wrapper">
<label class="file-input-custom" for="pageFile">
<i class="fa fa-image"></i>
<span id="pageFileText">Upload Video/Gambar</span>
</label>
<input type="file" id="pageFile" class="file-input-hidden" accept="image/*,video/*">
</div>
</div>

<!-- TEMPLATE FIELDS -->
<div id="templateFields" class="hidden">
<div class="input-box">
<select id="langSelect">
<option value="html">HTML</option>
<option value="css">CSS</option>
<option value="js">JavaScript</option>
<option value="python">Python</option>
<option value="php">PHP</option>
<option value="java">Java</option>
<option value="react">React</option>
</select>
</div>
<textarea id="codeInput" class="code-editor" placeholder="// Tulis kode disini..."></textarea>
</div>

<!-- APP FIELDS -->
<div id="appFields" class="hidden">
<div class="file-input-wrapper">
<label class="file-input-custom" for="appIcon">
<i class="fa fa-image"></i>
<span id="appIconText">Upload Icon App</span>
</label>
<input type="file" id="appIcon" class="file-input-hidden" accept="image/*">
</div>
<div class="file-input-wrapper">
<label class="file-input-custom" for="appFile">
<i class="fa fa-file-archive"></i>
<span id="appFileText">Upload APK/EXE/XAPK</span>
</label>
<input type="file" id="appFile" class="file-input-hidden" accept=".apk,.xapk,.exe">
</div>
<div class="input-box">
<select id="platformSelect">
<option value="android">Android</option>
<option value="windows">Windows</option>
<option value="ios">iOS</option>
<option value="linux">Linux</option>
</select>
</div>
</div>

<button onclick="uploadPost()" style="width:100%;padding:15px;font-size:16px"><i class="fa fa-upload"></i> Upload</button>
</div>

<!-- LOGIN -->
<div id="login" class="hidden">
<h3><i class="fa fa-right-to-bracket"></i> Login</h3>

<div class="input-box">
<input id="emailInput" placeholder="Email">
</div>
<div class="input-box">
<input id="passInput" type="password" placeholder="Password">
<i class="fa fa-eye-slash password-toggle" onclick="togglePassword()"></i>
</div>

<button onclick="loginEmail()" style="width:100%;margin:5px 0"><i class="fa fa-sign-in-alt"></i> Login</button>
<button onclick="register()" style="width:100%;background:#10b981"><i class="fa fa-user-plus"></i> Register</button>
<button onclick="loginGoogle()" style="width:100%;background:#db4437"><i class="fa fa-google"></i> Google</button>
<button onclick="loginGithub()" style="width:100%;background:#333"><i class="fa fa-github"></i> GitHub</button>
</div>

<!-- PROFILE -->
<div id="profile" class="hidden">
<h3><i class="fa fa-user"></i> Edit Profile</h3>

<div style="text-align:center;margin-bottom:20px">
<label id="profilePhotoLabel" class="profile-photo-input" for="profilePhoto">
<i class="fa fa-user"></i>
</label>
<input type="file" id="profilePhoto" class="file-input-hidden" accept="image/*">
<img id="profilePhotoPreview" class="profile-photo-preview hidden" src="">
</div>

<div class="input-box"><input id="usernameInput" placeholder="Username"></div>
<div class="input-box"><input id="birthInput" type="date"></div>

<button onclick="saveProfile()" style="width:100%;padding:15px;font-size:16px"><i class="fa fa-save"></i> Save Profile</button>
</div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
GoogleAuthProvider,
GithubAuthProvider,
signInWithPopup,
onAuthStateChanged,
updateProfile
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
doc,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const app = initializeApp({
apiKey:"AIzaSyC5zC4TCP_Txe21iCbHbVbHxEk4YleDv0Q",
authDomain:"smartlabscode.firebaseapp.com",
projectId:"smartlabscode",
storageBucket:"smartlabscode.appspot.com"
});

const auth=getAuth();
const db=getFirestore();
const storage=getStorage();

let posts=[], currentUser=null, currentFilter="all", currentBannerIndex=0;

// DOM Elements
const userLabel=document.getElementById('userLabel');
const profileImgNav=document.getElementById('profileImgNav');
const feed=document.getElementById('feed');
const sidebar=document.getElementById('sidebar');
const overlay=document.getElementById('overlay');
const searchInput=document.getElementById('searchInput');
const profilePhotoLabel=document.getElementById('profilePhotoLabel');
const profilePhotoPreview=document.getElementById('profilePhotoPreview');

// AUTH
onAuthStateChanged(auth, async (u) => {
currentUser = u;
userLabel.innerText = u ? u.email.split('@')[0] : "Guest";
if(u){
const userDoc = await getDoc(doc(db, "users", u.uid));
if(userDoc.exists()){
const userData = userDoc.data();
document.getElementById('usernameInput').value = userData.username || '';
document.getElementById('birthInput').value = userData.birth || '';
if(userData.photoURL){
profilePhotoPreview.src = userData.photoURL;
profilePhotoPreview.classList.remove('hidden');
profilePhotoLabel.style.display = 'none';
profileImgNav.src = userData.photoURL;
}
}
}
});

// LOAD POSTS
onSnapshot(collection(db,"posts"),snap=>{
posts=snap.docs.map(d=>d.data());
render(posts);
loadBanners();
});

// FULLSCREEN BANNER
function loadBanners(){
const bannerTrack = document.getElementById('bannerTrack');
bannerTrack.innerHTML = '';
// Demo banners - ganti dengan data real dari database
const demoBanners = ['Banner 1', 'Banner 2', 'Banner 3', 'Banner 4', 'Banner 5'];
demoBanners.forEach((text, index) => {
const banner = document.createElement('div');
banner.className = 'banner';
banner.innerHTML = text;
banner.onclick = () => activateBanner(index);
bannerTrack.appendChild(banner);
});
setInterval(() => nextBanner(), 4000);
}

function activateBanner(index){
document.querySelectorAll('.banner').forEach(b => b.classList.remove('active'));
document.querySelectorAll('.banner')[index].classList.add('active');
const bannerTrack = document.getElementById('bannerTrack');
bannerTrack.style.transform = `translateX(-${index * 110}%)`;
currentBannerIndex = index;
}

function nextBanner(){
currentBannerIndex = (currentBannerIndex + 1) % document.querySelectorAll('.banner').length;
activateBanner(currentBannerIndex);
}

// UPLOAD FIELDS TOGGLE
window.toggleUploadFields = () => {
const type = document.getElementById('typeSelect').value;
document.getElementById('pageFields').classList.toggle('hidden', type !== 'page');
document.getElementById('templateFields').classList.toggle('hidden', type !== 'template');
document.getElementById('appFields').classList.toggle('hidden', type !== 'app');
};

// FILE INPUT TEXT UPDATE
['pageFile', 'appIcon', 'appFile', 'profilePhoto'].forEach(id => {
document.getElementById(id).addEventListener('change', function(e){
const fileName = e.target.files[0]?.name || 'Upload File';
const textEl = document.getElementById(id === 'profilePhoto' ? 'profilePhotoLabel' : id + 'Text');
if(id !== 'profilePhoto'){
textEl.textContent = fileName;
} else {
const file = e.target.files[0];
if(file){
const reader = new FileReader();
reader.onload = (e) => {
profilePhotoPreview.src = e.target.result;
profilePhotoPreview.classList.remove('hidden');
profilePhotoLabel.style.display = 'none';
};
reader.readAsDataURL(file);
}
}
});
});

// PASSWORD TOGGLE
window.togglePassword = () => {
const passInput = document.getElementById('passInput');
const toggle = document.querySelector('.password-toggle');
if(passInput.type === 'password'){
passInput.type = 'text';
toggle.classList.remove('fa-eye-slash');
toggle.classList.add('fa-eye');
} else {
passInput.type = 'password';
toggle.classList.remove('fa-eye');
toggle.classList.add('fa-eye-slash');
}
};

// LOGIN FUNCTIONS
window.loginEmail=async()=>{
try{
await signInWithEmailAndPassword(auth,document.getElementById('emailInput').value.trim(),document.getElementById('passInput').value.trim());
}catch(e){alert(e.message)}
};

window.register=async()=>{
try{
await createUserWithEmailAndPassword(auth,document.getElementById('emailInput').value.trim(),document.getElementById('passInput').value.trim());
}catch(e){alert(e.message)}
};

window.loginGoogle=()=>signInWithPopup(auth,new GoogleAuthProvider());
window.loginGithub=()=>signInWithPopup(auth,new GithubAuthProvider());

// SAVE PROFILE
window.saveProfile = async () => {
if(!currentUser) return alert('Login dulu!');
try{
const photoFile = document.getElementById('profilePhoto').files[0];
let photoURL = '';
if(photoFile){
const photoRef = ref(storage, `profiles/${currentUser.uid}/${Date.now()}`);
await uploadBytes(photoRef, photoFile);
photoURL = await getDownloadURL(photoRef);
}

await setDoc(doc(db, "users", currentUser.uid), {
username: document.getElementById('usernameInput').value,
birth: document.getElementById('birthInput').value,
photoURL: photoURL || currentUser.photoURL,
updated: Date.now()
}, {merge: true});

await updateProfile(currentUser, {
photoURL: photoURL || currentUser.photoURL,
displayName: document.getElementById('usernameInput').value
});

alert('Profile saved!');
} catch(e){
alert('Error: ' + e.message);
}
};

// UPLOAD POST
window.uploadPost=async()=>{
if(!currentUser) return alert('Login dulu!');

const title=document.getElementById('titleInput').value.trim();
const desc=document.getElementById('descInput').value.trim();
const type=document.getElementById('typeSelect').value;

if(!title || !desc){
alert("Title & Description wajib diisi");
return;
}

try{
let mediaFiles = {};
const pageFile = document.getElementById('pageFile').files[0];
const appIconFile = document.getElementById('appIcon').files[0];
const appFile = document.getElementById('appFile').files[0];

if(type === 'page' && pageFile){
const refPath = ref(storage,"pages/"+Date.now());
await uploadBytes(refPath, pageFile);
mediaFiles.media = await getDownloadURL(refPath);
}

if(type === 'template'){
mediaFiles.code = document.getElementById('codeInput').value.trim();
mediaFiles.lang = document.getElementById('langSelect').value;
}

if(type === 'app'){
if(appIconFile){
const iconRef = ref(storage,"app-icons/"+Date.now());
await uploadBytes(iconRef, appIconFile);
mediaFiles.icon = await getDownloadURL(iconRef);
}
if(appFile){
const fileRef = ref(storage,"apps/"+Date.now());
await uploadBytes(fileRef, appFile);
mediaFiles.file = await getDownloadURL(fileRef);
}
mediaFiles.platform = document.getElementById('platformSelect').value;
}

await addDoc(collection(db,"posts"),{
title,desc,type,mediaFiles,
author: currentUser.email,
authorId: currentUser.uid,
authorName: currentUser.displayName || currentUser.email.split('@')[0],
time:Date.now()
});

alert("Upload berhasil!");
document.getElementById('upload').scrollIntoView();
} catch(e){
alert("Upload gagal: "+e.message);
}
};

// RENDER POSTS
function render(data){
let filtered=currentFilter==="all"
?data
:data.filter(p=>p.type===currentFilter);

feed.innerHTML="";
filtered.slice().reverse().forEach(p=>{
const typeIcon = p.type === 'page' ? 'fa-image page-icon' : 
p.type === 'template' ? 'fa-file-code template-icon' : 'fa-mobile-alt app-icon';
feed.innerHTML+=`
<div class="card">
<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
<i class="${typeIcon}"></i>
<h3 style="margin:0">${p.title}</h3>
${p.authorName ? `<span style="font-size:12px;color:#666">${p.authorName}</span>` : ''}
</div>
<p>${p.desc}</p>
${p.mediaFiles?.media ? `<video src="${p.mediaFiles.media}" controls style="width:100%;border-radius:8px"></video>` : ''}
${p.mediaFiles?.icon ? `<img src="${p.mediaFiles.icon}" style="width:50px;height:50px;border-radius:10px;margin:10px 0">` : ''}
${p.mediaFiles?.code ? `<pre style="background:#1e1e1e;color:#fff;padding:15px;border-radius:8px;overflow:auto">${p.mediaFiles.code}</pre>` : ''}
${p.mediaFiles?.file ? `<a href="${p.mediaFiles.file}" target="_blank" class="button" style="display:inline-block;margin-top:10px;padding:8px 16px;background:#10b981">📥 Download</a>` : ''}
<span style="font-size:12px;color:#999">${new Date(p.time).toLocaleString('id-ID')}</span>
</div>`;
});
}

// FILTER
window.filterHome=(t,el)=>{
currentFilter=t;
document.querySelectorAll(".home-filter button").forEach(b=>b.classList.remove("active"));
if(el) el.classList.add("active");
render(posts);
};

// SEARCH
window.doSearch=()=>{
let q=searchInput.value.toLowerCase();
render(posts.filter(p=>
(p.title||"").toLowerCase().includes(q)||
(p.desc||"").toLowerCase().includes(q)
));
};

// PAGE NAVIGATION
window.setPage=(id,el)=>{
document.querySelectorAll(".content > div").forEach(e=>e.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");

document.querySelectorAll(".sidebar button").forEach(b=>b.classList.remove("active"));
if(el) el.classList.add("active");

closeSidebar();
};

// SIDEBAR
window.toggleSidebar=()=>{
sidebar.classList.add("active");
overlay.classList.add("active");
};

window.closeSidebar=()=>{
sidebar.classList.remove("active");
overlay.classList.remove("active");
};
</script>

</body>
</html>
