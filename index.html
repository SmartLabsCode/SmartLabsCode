<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome To | SmartLabsCode</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Segoe UI;background:#f5f7fa;color:#222}

/* NAVBAR */
.navbar{
position:fixed;top:0;width:100%;height:60px;
display:flex;justify-content:space-between;
align-items:center;padding:0 15px;
background:#fff;border-bottom:1px solid #ddd;
z-index:1000;gap:10px;
}

.search{
padding:8px 12px;border-radius:20px;
border:1px solid #ccc;outline:none;width:200px;
}

/* SIDEBAR */
.sidebar{
position:fixed;top:60px;left:-260px;
width:240px;height:100%;
background:#fff;padding:15px;
transition:.3s;border-right:1px solid #ddd;
z-index:1001;
}

.sidebar.active{left:0}

.sidebar button{
width:100%;padding:12px;margin:6px 0;
border:none;border-radius:8px;
background:#f3f3f3;cursor:pointer;
display:flex;gap:10px;
}

.sidebar button.active{
background:#4f46e5;color:#fff;
}

/* OVERLAY */
.overlay{
position:fixed;inset:0;
background:rgba(0,0,0,.3);
backdrop-filter:blur(5px);
opacity:0;visibility:hidden;
transition:.3s;z-index:999;
}
.overlay.active{opacity:1;visibility:visible}

/* CONTENT */
.content{margin-top:70px;padding:20px}
.hidden{display:none}

/* CARD */
.card{
background:#fff;padding:15px;
border-radius:10px;margin-bottom:10px;
border:1px solid #ddd;
}

/* INPUT */
.input-box{
display:flex;align-items:center;
border:1px solid #ccc;
border-radius:8px;margin:6px 0;
background:#fff;
padding:0 10px;
gap:8px;
}

.input-box input,.input-box textarea{
flex:1;border:none;outline:none;
padding:10px;
}

/* BUTTON */
button{
padding:10px;border:none;
border-radius:8px;background:#4f46e5;
color:#fff;cursor:pointer;
}

/* HOME FILTER */
.home-filter{
display:flex;gap:10px;margin:10px 0;
}

.home-filter button{
flex:1;background:#e5e7eb;color:#111;
}

.home-filter button.active{
background:#4f46e5;color:#fff;
}

/* BANNER */
.banner-wrap{
display:flex;gap:10px;
overflow-x:auto;margin-bottom:10px;
}

.banner{
min-width:200px;height:120px;
background:#e5e7eb;border-radius:10px;
display:flex;align-items:center;
justify-content:center;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<div>
<i class="fa fa-bars" onclick="toggleSidebar()"></i>
<b><i class="fa fa-code"></i> SmartLabsCode</b>
</div>

<input class="search" id="searchInput" placeholder="Search..." oninput="doSearch()">

<span id="userLabel">Guest</span>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<button onclick="setPage('home',this)" class="active"><i class="fa fa-home"></i>Home</button>
<button onclick="setPage('upload',this)"><i class="fa fa-upload"></i>Upload</button>
<button onclick="setPage('login',this)"><i class="fa fa-right-to-bracket"></i>Login</button>
<button onclick="setPage('profile',this)"><i class="fa fa-user"></i>Edit</button>
</div>

<div class="content">

<!-- HOME -->
<div id="home">
<h2><i class="fa fa-rss"></i> Feed</h2>

<div class="banner-wrap">
<div class="banner">Banner 1</div>
<div class="banner">Banner 2</div>
<div class="banner">Banner 3</div>
</div>

<div class="home-filter">
<button class="active" onclick="filterHome('all',this)">All</button>
<button onclick="filterHome('post',this)">Page</button>
<button onclick="filterHome('template',this)">Template</button>
<button onclick="filterHome('app',this)">App</button>
</div>

<div id="feed"></div>
</div>

<!-- UPLOAD -->
<div id="upload" class="hidden">
<h3>Upload</h3>

<select id="typeSelect">
<option value="post">Post</option>
<option value="template">Template</option>
<option value="app">App</option>
</select>

<div class="input-box"><input id="titleInput" placeholder="Title"></div>
<div class="input-box"><input id="descInput" placeholder="Desc"></div>
<input type="file" id="fileInput">
<textarea id="codeInput" placeholder="Code"></textarea>

<button onclick="uploadPost()">Upload</button>
</div>

<!-- LOGIN -->
<div id="login" class="hidden">
<h3>Login</h3>

<div class="input-box"><input id="emailInput" placeholder="Email"></div>
<div class="input-box"><input id="passInput" type="password" placeholder="Password"></div>

<button onclick="loginEmail()">Login</button>
<button onclick="register()">Register</button>
<button onclick="loginGoogle()">Google</button>
<button onclick="loginGithub()">GitHub</button>
</div>

<!-- PROFILE -->
<div id="profile" class="hidden">
<h3>Edit</h3>

<div class="input-box"><input id="usernameInput" placeholder="Username"></div>
<div class="input-box"><input id="birthInput" type="date"></div>

<button onclick="saveProfile()">Save</button>
</div>

</div>

<!-- FIREBASE FIXED -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
GoogleAuthProvider,
GithubAuthProvider,
signInWithPopup,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

/* CONFIG */
const app = initializeApp({
apiKey:"AIzaSyC5zC4TCP_Txe21iCbHbVbHxEk4YleDv0Q",
authDomain:"smartlabscode.firebaseapp.com",
projectId:"smartlabscode",
storageBucket:"smartlabscode.appspot.com"
});

const auth=getAuth();
const db=getFirestore();
const storage=getStorage();

let posts=[];
let currentFilter="all";

/* AUTH SAFE */
onAuthStateChanged(auth,u=>{
userLabel.innerText=u?u.email:"Guest";
});

/* LOGIN FIXED */
window.loginEmail=async()=>{
try{
await signInWithEmailAndPassword(auth,emailInput.value.trim(),passInput.value.trim());
}catch(e){alert(e.message)}
};

window.register=async()=>{
try{
await createUserWithEmailAndPassword(auth,emailInput.value.trim(),passInput.value.trim());
}catch(e){alert(e.message)}
};

window.loginGoogle=()=>signInWithPopup(auth,new GoogleAuthProvider());
window.loginGithub=()=>signInWithPopup(auth,new GithubAuthProvider());

/* UPLOAD FIX (NO EMPTY BUG) */
window.uploadPost=async()=>{

const title=titleInput.value.trim();
const desc=descInput.value.trim();
const file=fileInput.files[0];
const code=codeInput.value.trim();
const type=typeSelect.value;

if(!title || !desc){
alert("Title & Desc wajib diisi");
return;
}

let url="";

try{

if(file){
let r=ref(storage,"files/"+Date.now());
await uploadBytes(r,file);
url=await getDownloadURL(r);
}

await addDoc(collection(db,"posts"),{
title,desc,type,file:url,code,time:Date.now()
});

alert("Upload sukses");

}catch(e){
alert("Upload gagal: "+e.message);
}

};

/* LOAD */
onSnapshot(collection(db,"posts"),snap=>{
posts=snap.docs.map(d=>d.data());
render(posts);
});

/* RENDER */
function render(data){
let filtered=currentFilter==="all"
?data
:data.filter(p=>p.type===currentFilter);

feed.innerHTML="";
filtered.forEach(p=>{
feed.innerHTML+=`
<div class="card">
<h3>${p.title||""}</h3>
<p>${p.desc||""}</p>
${p.file?`<img src="${p.file}" style="width:100%">`:``}
${p.code?`<pre>${p.code}</pre>`:``}
</div>`;
});
}

/* FILTER FIX */
window.filterHome=(t,el)=>{
currentFilter=t;
document.querySelectorAll(".home-filter button").forEach(b=>b.classList.remove("active"));
if(el) el.classList.add("active");
render(posts);
};

/* SEARCH */
window.doSearch=()=>{
let q=searchInput.value.toLowerCase();
render(posts.filter(p=>
(p.title||"").toLowerCase().includes(q)||
(p.desc||"").toLowerCase().includes(q)
));
};

/* PAGE */
window.setPage=(id,el)=>{
document.querySelectorAll(".content > div").forEach(e=>e.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");

document.querySelectorAll(".sidebar button").forEach(b=>b.classList.remove("active"));
if(el) el.classList.add("active");

closeSidebar();
};

/* SIDEBAR */
window.toggleSidebar=()=>{
sidebar.classList.add("active");
overlay.classList.add("active");
};

window.closeSidebar=()=>{
sidebar.classList.remove("active");
overlay.classList.remove("active");
};
</script>

</body>
</html>
